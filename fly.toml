app = "quidax-monitor"
region = "jnb"

[build]
  builder = "paketobuildpacks/builder:base"

[processes]
  web = "uvicorn api:app --host 0.0.0.0 --port 8080"
  monitor = "python debug.py"

[[services]]
  protocol = "tcp"
  internal_port = 8080
  processes = ["web"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.http_checks]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    path = "/health"

[mounts]
  source = "quidax_data"
  destination = "/app/data"