app = "quidax-monitor"
primary_region = "jnb"

[build]

[env]
  PORT = "8080"

[[vm]]
  memory   = "1gb"
  cpu_kind = "shared"
  cpus     = 1

[mounts]
  source      = "quidax_data"
  destination = "/app/data"

[[services]]
  internal_port = 8080
  protocol      = "tcp"

  [[services.ports]]
    port     = 80
    handlers = ["http"]

  [[services.ports]]
    port     = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.http_checks]]
    interval     = "15s"
    timeout      = "5s"
    grace_period = "60s"
    path         = "/health"