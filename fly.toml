app = "quidax-monitor"
primary_region = "jnb"  # Johannesburg — closest to Nigeria

[build]
  builder = "paketobuildpacks/builder:base"

[processes]
  web = "uvicorn api:app --host 0.0.0.0 --port 8080"
  monitor = "python debug.py"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true

[mounts]
  source = "quidax_data"
  destination = "/app/data"